[project]
name = "deedee"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.12.4",
    "typing-inspect>=0.9.0",
]

[dependency-groups]
dev = [
    "black>=25.11.0",
    "mypy>=1.20.2",
    "pre-commit>=4.4.0",
    "pytest>=9.0.2",
]

[tool.pytest.ini_options]
pythonpath = ["code"]
testpaths = ["code/tests"]

[tool.mypy]
python_version = "3.14"
mypy_path = ["code"]
files = ["code"]
explicit_package_bases = true
